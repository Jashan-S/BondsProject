name: Update market data

on:
  schedule:
    # 22:30 UTC, Monday-Friday — after US market close, before midnight ET
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Record history snapshot
        run: python scripts/fetch_history.py

      - name: Fetch TRACE corporate aggregates
        env:
          FINRA_API_CLIENT_ID: ${{ secrets.FINRA_API_CLIENT_ID }}
          FINRA_API_CLIENT_SECRET: ${{ secrets.FINRA_API_CLIENT_SECRET }}
        run: python scripts/fetch_trace.py

      - name: Rebuild sitemap
        run: python scripts/build_sitemap.py

      - name: Commit and push if changed
        run: |
          git config user.name "basispoint-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ sitemap.xml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update market data [skip ci]"
          git push

      - name: Freshness guard (fails loudly if sources stale)
        run: python scripts/check_freshness.py